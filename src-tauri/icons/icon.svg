<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="880" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ea0ff"/>
      <stop offset="0.55" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#6a4bff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="512" y1="40" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bolt" x1="430" y1="300" x2="600" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd64a"/>
      <stop offset="1" stop-color="#ff9d0a"/>
    </linearGradient>
    <filter id="cardShadow" x="180" y="160" width="664" height="760" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#16183f" flood-opacity="0.30"/>
    </filter>
    <filter id="boltShadow" x="280" y="240" width="520" height="640" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#8a3d06" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- background squircle -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#sheen)"/>

  <!-- note card -->
  <g filter="url(#cardShadow)">
    <rect x="286" y="212" width="452" height="600" rx="56" fill="#ffffff"/>
  </g>

  <!-- text lines (the "note") -->
  <g fill="#cfd6ec">
    <rect x="350" y="300" width="324" height="34" rx="17"/>
    <rect x="350" y="372" width="324" height="34" rx="17"/>
    <rect x="350" y="444" width="210" height="34" rx="17"/>
  </g>

  <!-- lightning bolt (the "instant") -->
  <path filter="url(#boltShadow)"
        d="M566 268 L356 596 L488 596 L446 812 L690 484 L548 484 Z"
        fill="url(#bolt)"
        stroke="#ffffff" stroke-width="22" stroke-linejoin="round"/>
</svg>
